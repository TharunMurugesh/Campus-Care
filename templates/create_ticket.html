{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0 border-0 pt-4">
                <h4>Report a New Issue</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('create_ticket') }}">
                    <div class="mb-3">
                        <label class="form-label">Issue Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="Brief summary of the issue">
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Related Department</label>
                            <select name="department_id" class="form-select" required>
                                <option value="">Select Department...</option>
                                {% for d in departments %}
                                <option value="{{ d.id }}">{{ d.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select" required>
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="5" required placeholder="Provide detailed information about the issue..."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Submit Ticket</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
