{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 login-card staff-login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Staff & Admin Portal</h3>
                    <p class="text-muted">Manage campus issues</p>
                </div>
                <form method="POST" action="{{ url_for('staff_login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Staff/Admin Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="staff@campus.edu">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-dark w-100 btn-lg shadow-sm">Login to Workspace</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">New staff member? <a href="{{ url_for('staff_register') }}" class="fw-bold text-decoration-none text-dark">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
