{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4">Campus Admin Login</h3>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Campus Code</label>
                        <input type="text" name="campus_code" class="form-control" required placeholder="CCYYYYNNNN">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Login to Admin Panel</button>
                </form>
                <div class="text-center mt-4">
                    <a href="{{ url_for('campus_create') }}" class="text-decoration-none">Register a new campus</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
