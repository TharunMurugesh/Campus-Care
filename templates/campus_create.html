{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4">Register New Campus</h3>
                <p class="text-muted text-center">Create a new workspace for your institution.</p>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Institution / Campus Name</label>
                        <input type="text" name="campus_name" class="form-control" required placeholder="e.g. State University">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Official Domain</label>
                        <input type="text" name="official_domain" class="form-control" required placeholder="e.g. state.edu">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Admin Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register Campus</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('campus_login') }}" class="text-decoration-none">Already have a campus code? Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
