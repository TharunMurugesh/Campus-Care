{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Student Registration</h3>
                    <p class="text-muted">Create your campus account</p>
                </div>
                <form method="POST" action="{{ url_for('student_register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" required placeholder="student@campus.edu">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Create Account</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">Already have an account? <a href="{{ url_for('student_login') }}" class="fw-bold text-decoration-none">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
