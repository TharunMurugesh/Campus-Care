{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 login-card staff-login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Staff Registration</h3>
                    <p class="text-muted">Join your department</p>
                </div>
                <form method="POST" action="{{ url_for('staff_register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="Jane Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" required placeholder="staff@campus.edu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department</label>
                        <select name="department_id" class="form-select" required>
                            <option value="">Select Department...</option>
                            {% for d in departments %}
                            <option value="{{ d.id }}">{{ d.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-dark w-100 btn-lg shadow-sm">Create Staff Account</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">Already registered? <a href="{{ url_for('staff_login') }}" class="fw-bold text-decoration-none text-dark">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
